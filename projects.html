<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Anya Jain projects.">
  <title>Anya Jain Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css?v=20260504-0324">
</head>
<body>
  <header class="site-header">
    <nav aria-label="Primary navigation">
      <a href="index.html">about me</a>
      <a href="projects.html" aria-current="page">projects</a>
    </nav>
  </header>

  <main class="projects-page">
    <section class="projects-section" aria-labelledby="projects-title">
      <div class="section-heading">
        <h1 id="projects-title">//projects</h1>
        <p>[clickapreviewtoexpand%^*]</p>
      </div>

      <div class="project-grid">
        <button class="project-tile" type="button" data-project="0">
          <video src="thomas-attractor-7x.mov" muted loop playsinline preload="metadata"></video>
          <span>[Thomas Attractor]</span>
          <small>//made with TouchDesigner//</small>
        </button>
        <button class="project-tile" type="button" data-project="1">
          <img src="conceptual-3d-models.png" alt="">
          <span>[Conceptual 3D Models]</span>
          <small>//Designed and rendered from scratch using Shapr3D//</small>
        </button>
        <button class="project-tile" type="button" data-project="2">
          <video src="pinchcon111.mp4" muted loop playsinline preload="metadata"></video>
          <span>[Pinch-controlled 3D Particle System]</span>
          <small>//Made with TouchDesigner &amp; MediaPipe Plugin//</small>
        </button>
        <button class="project-tile" type="button" data-project="3">
          <img src="mixed-media-emperor-penguin.png" alt="">
          <span>[Mixed Media Works]</span>
          <small>//digital art, photography, photoshop//</small>
        </button>
        <button class="project-tile" type="button" data-project="4">
          <img src="persian-rugs-fractals.png" alt="">
          <span>[Persian Rugs - Fractals-Based Graphics]</span>
          <small>//coded in Python on Visual Studio Code//</small>
        </button>
      </div>
    </section>
  </main>

  <dialog class="project-dialog" id="project-dialog" aria-labelledby="dialog-title">
    <button class="close-dialog" type="button" aria-label="Close project">×</button>
    <div class="dialog-media" id="dialog-media"></div>
    <div class="dialog-copy">
      <p class="dialog-kicker">//expanded project</p>
      <h2 id="dialog-title"></h2>
      <p id="dialog-description"></p>
      <dl class="project-meta">
        <div>
          <dt>tools</dt>
          <dd id="dialog-tools"></dd>
        </div>
      </dl>
    </div>
  </dialog>

  <script src="index.js?v=20260504-0328"></script>
</body>
</html>
